# GitHub Actions 自动部署流水线配置文件
# 实现多环境隔离：dev分支部署开发环境，test分支部署测试环境，master分支部署生产环境

name: 自动部署流水线

# 触发条件：当代码推送到 test、master 分支时执行
on:
  push:
    branches:
      - test
      - master

# 定义环境变量
env:
  # 项目名称
  PROJECT_NAME: container
  # 构建输出目录
  BUILD_DIR: dist

jobs:
  # 构建作业
  build:
    # 在 Ubuntu 最新版本上运行
    runs-on: ubuntu-latest
    # 步骤
    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4
      
      # 2. 设置 Node.js 环境
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 使用 Node.js 20 版本
          cache: 'npm'  # 缓存 npm 依赖
      
      # 3. 安装依赖
      - name: 安装依赖
        run: npm install
      
      # 4. 构建打包
      - name: 构建项目
        run: npm run build
      
      # 5. 上传构建产物作为 artifact
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.BUILD_DIR }}

  # 部署作业 - 测试环境
  deploy-test:
    needs: build
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.BUILD_DIR }}
      
      - name: SSH 部署到服务器
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd /www/wwwroot/test.${{ env.PROJECT_NAME }}.com
            if [ -d "${{ env.BUILD_DIR }}" ]; then
              mv ${{ env.BUILD_DIR }} ${{ env.BUILD_DIR }}_backup_$(date +%Y%m%d_%H%M%S)
            fi
            mkdir -p ${{ env.BUILD_DIR }}

      - name: 上传构建文件
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: "${{ env.BUILD_DIR }}/*"
          target: "/www/wwwroot/test.${{ env.PROJECT_NAME }}.com/${{ env.BUILD_DIR }}"
      
      - name: 重启测试环境服务
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            # 重启服务命令
            echo "测试环境部署完成"

  # 部署作业 - 生产环境
  deploy-prod:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.BUILD_DIR }}
      
      - name: SSH 部署到服务器
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd /www/wwwroot/${{ env.PROJECT_NAME }}.com
            if [ -d "${{ env.BUILD_DIR }}" ]; then
              mv ${{ env.BUILD_DIR }} ${{ env.BUILD_DIR }}_backup_$(date +%Y%m%d_%H%M%S)
            fi
            mkdir -p ${{ env.BUILD_DIR }}

      - name: 上传构建文件
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: "${{ env.BUILD_DIR }}/*"
          target: "/www/wwwroot/${{ env.PROJECT_NAME }}.com/${{ env.BUILD_DIR }}"
      
      - name: 重启生产环境服务
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            # 重启服务命令
            echo "生产环境部署完成"