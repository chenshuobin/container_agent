# GitHub Actions Automatic Deployment Workflow
# Multi-environment isolation: test branch deploys to test environment, master branch deploys to production environment

name: Automatic Deployment Workflow

# Trigger conditions: Execute when code is pushed to test or master branch
on:
  push:
    branches:
      - test
      - master

# Define environment variables
env:
  # Project name
  PROJECT_NAME: container
  # Build output directory
  BUILD_DIR: frontend/dist
  # Use Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build job
  build:
    # Run on Ubuntu latest version
    runs-on: ubuntu-latest
    # Steps
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'  # Use Node.js 24 version
          cache: 'npm'  # Cache npm dependencies
      
      # 3. Install dependencies (frontend)
      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend
      
      # 4. Build project (frontend)
      - name: Build frontend project
        run: npm run build
        working-directory: ./frontend
      
      # 5. Output environment variables (for debugging)
      - name: Output environment variables
        run: |
          echo "PROJECT_NAME: $PROJECT_NAME"
          echo "BUILD_DIR: $BUILD_DIR"
          echo "SERVER_HOST exists: ${{ secrets.SERVER_HOST != '' }}"
          echo "SERVER_USER exists: ${{ secrets.SERVER_USER != '' }}"
          echo "SERVER_KEY exists: ${{ secrets.SERVER_KEY != '' }}"

      # 6. Upload build artifact
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.BUILD_DIR }}

  # Deploy job - Test environment
  deploy-test:
    needs: build
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.BUILD_DIR }}

      # Debug: Check secrets availability
      - name: Debug secrets
        run: |
          echo "Checking secrets availability..."
          echo "SERVER_HOST: ${{ secrets.SERVER_HOST }}"
          echo "SERVER_USER: ${{ secrets.SERVER_USER }}"
          echo "SERVER_KEY exists: ${{ secrets.SERVER_KEY != '' }}"
          echo "SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}"

      - name: SSH deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          debug: true
          timeout: 60s
          script: |
            cd /www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc
            # 备份旧的dist目录（如果存在）
            if [ -d "dist" ]; then
              mv dist dist_backup_$(date +%Y%m%d_%H%M%S)
            fi
            # 创建新的dist目录
            mkdir -p dist
            echo "Directory structure prepared!"

      - name: Upload build files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          debug: true
          source: "${{ env.BUILD_DIR }}/*"
          target: "/www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc/dist/"

      - name: Fix directory structure
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          debug: true
          script: |
            echo "=== Fixing directory structure ==="
            cd /www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc
            # 检查是否存在dist/dist目录
            if [ -d "dist/dist" ]; then
              echo "Found dist/dist directory, fixing..."
              # 移动dist/dist中的文件到dist目录
              mv dist/dist/* dist/
              # 删除空的dist/dist目录
              rmdir dist/dist
              echo "Directory structure fixed!"
            else
              echo "No dist/dist directory found, structure is correct."
            fi
            # 设置正确的文件权限
            echo "Setting correct file permissions..."
            chown -R www:www /www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc/
            chmod -R 755 /www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc/
            chmod 644 /www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc/dist/index.html
            echo "File permissions set correctly!"
            echo "=== Directory structure fixed ==="

      - name: Verify file upload with detailed debug
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          debug: true
          script: |
            echo "=== Detailed file upload verification ==="
            echo "Checking deployment directory..."
            ls -la /www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc/
            echo "Checking dist directory..."
            ls -la /www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc/dist/
            echo "Checking if index.html exists..."
            if [ -f "/www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc/dist/index.html" ]; then
              echo "✅ index.html exists!"
              echo "File size: $(ls -lh /www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc/dist/index.html | awk '{print $5}')"
              echo "File content preview:"
              head -n 10 /www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc/dist/index.html
            else
              echo "❌ index.html does NOT exist!"
              echo "Creating a test index.html file..."
              echo '<!DOCTYPE html><html><head><title>Test Page</title></head><body><h1>Hello from test file!</h1></body></html>' > /www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc/dist/index.html
              echo "Test index.html created!"
            fi
            echo "=== Verification complete ==="

      - name: List local build files
        run: |
          echo "本地构建文件:"
          ls -la ${{ env.BUILD_DIR }}
          echo "构建文件内容:"
          cat ${{ env.BUILD_DIR }}/index.html

      - name: Verify file upload
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          debug: true
          script: |
            echo "验证文件上传..."
            echo "进入部署目录..."
            cd /www/wwwroot/test.${{ env.PROJECT_NAME }}.shadowless.cc
            echo "当前目录: $(pwd)"
            echo "目录内容:"
            ls -la
            echo "dist目录内容:"
            ls -la dist
            echo "构建文件内容:"
            cat dist/index.html || echo "index.html 文件不存在"
            echo "验证完成"

      - name: Check Nginx configuration
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            echo "检查Nginx配置..."
            nginx -t
            echo "Nginx状态:"
            systemctl status nginx || service nginx status
            echo "检查完成"

      - name: Restart test environment service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            # Restart service command
            echo "Test environment deployment completed"

  # Deploy job - Production environment
  deploy-prod:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.BUILD_DIR }}

      - name: SSH deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          debug: true
          timeout: 60s
          script: |
            cd /www/wwwroot/${{ env.PROJECT_NAME }}.shadowless.cc
            if [ -d "${{ env.BUILD_DIR }}" ]; then
              mv ${{ env.BUILD_DIR }} ${{ env.BUILD_DIR }}_backup_$(date +%Y%m%d_%H%M%S)
            fi
            mkdir -p ${{ env.BUILD_DIR }}

      - name: Upload build files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          debug: true
          source: "${{ env.BUILD_DIR }}/*"
          target: "/www/wwwroot/${{ env.PROJECT_NAME }}.shadowless.cc/${{ env.BUILD_DIR }}/"

      - name: Fix directory structure
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          debug: true
          script: |
            echo "=== Fixing directory structure ==="
            cd /www/wwwroot/${{ env.PROJECT_NAME }}.shadowless.cc
            # 检查是否存在dist/dist目录
            if [ -d "dist/dist" ]; then
              echo "Found dist/dist directory, fixing..."
              # 移动dist/dist中的文件到dist目录
              mv dist/dist/* dist/
              # 删除空的dist/dist目录
              rmdir dist/dist
              echo "Directory structure fixed!"
            else
              echo "No dist/dist directory found, structure is correct."
            fi
            # 设置正确的文件权限
            echo "Setting correct file permissions..."
            chown -R www:www /www/wwwroot/${{ env.PROJECT_NAME }}.shadowless.cc/
            chmod -R 755 /www/wwwroot/${{ env.PROJECT_NAME }}.shadowless.cc/
            chmod 644 /www/wwwroot/${{ env.PROJECT_NAME }}.shadowless.cc/dist/index.html
            echo "File permissions set correctly!"
            echo "=== Directory structure fixed ==="

      - name: Verify file upload with detailed debug
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          debug: true
          script: |
            echo "=== Detailed file upload verification ==="
            echo "Checking deployment directory..."
            ls -la /www/wwwroot/${{ env.PROJECT_NAME }}.shadowless.cc/
            echo "Checking dist directory..."
            ls -la /www/wwwroot/${{ env.PROJECT_NAME }}.shadowless.cc/dist/
            echo "Checking if index.html exists..."
            if [ -f "/www/wwwroot/${{ env.PROJECT_NAME }}.shadowless.cc/dist/index.html" ]; then
              echo "✅ index.html exists!"
              echo "File size: $(ls -lh /www/wwwroot/${{ env.PROJECT_NAME }}.shadowless.cc/dist/index.html | awk '{print $5}')"
              echo "File content preview:"
              head -n 10 /www/wwwroot/${{ env.PROJECT_NAME }}.shadowless.cc/dist/index.html
            else
              echo "❌ index.html does NOT exist!"
              echo "Creating a test index.html file..."
              echo '<!DOCTYPE html><html><head><title>Test Page</title></head><body><h1>Hello from test file!</h1></body></html>' > /www/wwwroot/${{ env.PROJECT_NAME }}.shadowless.cc/dist/index.html
              echo "Test index.html created!"
            fi
            echo "=== Verification complete ==="

      - name: Check Nginx configuration
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            echo "检查Nginx配置..."
            nginx -t
            echo "Nginx状态:"
            systemctl status nginx || service nginx status
            echo "检查完成"

      - name: Restart production environment service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            # Restart service command
            echo "Production environment deployment completed"
