# GitHub Actions 自动部署流水线配置文件
# 实现多环境隔离：dev分支部署开发环境，test分支部署测试环境，master分支部署生产环境

name: 自动部署流水线

# 触发条件：当代码推送到 dev、test、master 分支时执行
on:
  push:
    branches:
      - dev
      - test
      - master

# 定义环境变量
env:
  # 项目名称
  PROJECT_NAME: container-agent
  # 构建输出目录
  BUILD_DIR: dist

jobs:
  # 构建作业
  build:
    # 在 Ubuntu 最新版本上运行
    runs-on: ubuntu-latest
    # 步骤
    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4
      
      # 2. 设置 Node.js 环境
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 使用 Node.js 20 版本
          cache: 'npm'  # 缓存 npm 依赖
      
      # 3. 安装依赖
      - name: 安装依赖
        run: npm install
      
      # 4. 构建打包
      - name: 构建项目
        run: npm run build
      
      # 5. 上传构建产物作为 artifact
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.BUILD_DIR }}

  # 部署作业 - 开发环境
  deploy-dev:
    # 依赖构建作业
    needs: build
    # 只在 dev 分支触发
    if: github.ref == 'refs/heads/dev'
    # 在 Ubuntu 最新版本上运行
    runs-on: ubuntu-latest
    # 步骤
    steps:
      # 1. 下载构建产物
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.BUILD_DIR }}
      
      # 2. SSH 部署到开发服务器
      - name: SSH 部署到开发服务器
        uses: appleboy/ssh-action@v1.0.0
        with:
          # 服务器 IP 地址（从 GitHub Secrets 获取）
          host: ${{ secrets.DEV_SERVER_HOST }}
          # SSH 端口（默认 22）
          port: ${{ secrets.DEV_SERVER_PORT || '22' }}
          # SSH 用户名（从 GitHub Secrets 获取）
          username: ${{ secrets.DEV_SERVER_USER }}
          # SSH 私钥（从 GitHub Secrets 获取）
          key: ${{ secrets.DEV_SERVER_KEY }}
          # 执行的命令
          script: |
            # 进入部署目录
            cd /www/wwwroot/dev.${{ env.PROJECT_NAME }}.com
            # 备份旧文件
            if [ -d "${{ env.BUILD_DIR }}" ]; then
              mv ${{ env.BUILD_DIR }} ${{ env.BUILD_DIR }}_backup_$(date +%Y%m%d_%H%M%S)
            fi
            # 创建新的构建目录
            mkdir -p ${{ env.BUILD_DIR }}
            # 退出 SSH 会话，准备上传文件

      # 3. 上传构建文件到开发服务器
      - name: 上传构建文件
        uses: appleboy/scp-action@v0.1.7
        with:
          # 服务器 IP 地址
          host: ${{ secrets.DEV_SERVER_HOST }}
          # SSH 端口
          port: ${{ secrets.DEV_SERVER_PORT || '22' }}
          # SSH 用户名
          username: ${{ secrets.DEV_SERVER_USER }}
          # SSH 私钥
          key: ${{ secrets.DEV_SERVER_KEY }}
          # 本地文件路径
          source: "${{ env.BUILD_DIR }}/*"
          # 远程目标路径
          target: "/www/wwwroot/dev.${{ env.PROJECT_NAME }}.com/${{ env.BUILD_DIR }}"
      
      # 4. 重启开发环境服务
      - name: 重启开发环境服务
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          port: ${{ secrets.DEV_SERVER_PORT || '22' }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_KEY }}
          script: |
            # 这里可以添加重启服务的命令
            # 例如：systemctl restart nginx
            echo "开发环境部署完成"

  # 部署作业 - 测试环境
  deploy-test:
    needs: build
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.BUILD_DIR }}
      
      - name: SSH 部署到测试服务器
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          port: ${{ secrets.TEST_SERVER_PORT || '22' }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          script: |
            cd /www/wwwroot/test.${{ env.PROJECT_NAME }}.com
            if [ -d "${{ env.BUILD_DIR }}" ]; then
              mv ${{ env.BUILD_DIR }} ${{ env.BUILD_DIR }}_backup_$(date +%Y%m%d_%H%M%S)
            fi
            mkdir -p ${{ env.BUILD_DIR }}

      - name: 上传构建文件
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          port: ${{ secrets.TEST_SERVER_PORT || '22' }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          source: "${{ env.BUILD_DIR }}/*"
          target: "/www/wwwroot/test.${{ env.PROJECT_NAME }}.com/${{ env.BUILD_DIR }}"
      
      - name: 重启测试环境服务
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          port: ${{ secrets.TEST_SERVER_PORT || '22' }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          script: |
            # 重启服务命令
            echo "测试环境部署完成"

  # 部署作业 - 生产环境
  deploy-prod:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.BUILD_DIR }}
      
      - name: SSH 部署到生产服务器
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          port: ${{ secrets.PROD_SERVER_PORT || '22' }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_KEY }}
          script: |
            cd /www/wwwroot/${{ env.PROJECT_NAME }}.com
            if [ -d "${{ env.BUILD_DIR }}" ]; then
              mv ${{ env.BUILD_DIR }} ${{ env.BUILD_DIR }}_backup_$(date +%Y%m%d_%H%M%S)
            fi
            mkdir -p ${{ env.BUILD_DIR }}

      - name: 上传构建文件
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          port: ${{ secrets.PROD_SERVER_PORT || '22' }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_KEY }}
          source: "${{ env.BUILD_DIR }}/*"
          target: "/www/wwwroot/${{ env.PROJECT_NAME }}.com/${{ env.BUILD_DIR }}"
      
      - name: 重启生产环境服务
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          port: ${{ secrets.PROD_SERVER_PORT || '22' }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_KEY }}
          script: |
            # 重启服务命令
            echo "生产环境部署完成"